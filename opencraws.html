<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPENCRAWS // NEURAL ASSISTANT v2.0</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@300;400;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0d1117;color:#fff;font-family:'Share Tech Mono',monospace}

/* ── Circuit board background ── */
.circuit-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:0.04}
.circuit-bg svg{width:100%;height:100%}

/* ── Binary rain ── */
.binary-rain{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;overflow:hidden}
.binary-digit{position:absolute;font-family:'Share Tech Mono',monospace;font-size:12px;color:#00e5cc;opacity:0;animation:binaryFall linear infinite}
@keyframes binaryFall{0%{transform:translateY(-20px);opacity:0}10%{opacity:0.08}90%{opacity:0.05}100%{transform:translateY(100vh);opacity:0}}

/* ── Title ── */
.title{position:fixed;top:30px;left:50%;transform:translateX(-50%);text-align:center;z-index:10}
.title h1{font-family:'Orbitron',sans-serif;font-weight:500;font-size:18px;letter-spacing:6px;color:#ff4444;text-shadow:0 0 20px rgba(255,68,68,0.3);transition:color 0.5s ease}
.title .sub{font-size:10px;letter-spacing:5px;color:#ff6b35;margin-top:6px;opacity:0.8}

/* ── Status panel bottom-left ── */
.status-panel{position:fixed;bottom:80px;left:20px;z-index:15;display:flex;flex-direction:column;gap:6px;font-size:9px;letter-spacing:2px;color:#666}
.status-panel .status-row{display:flex;align-items:center;gap:6px}
.status-panel .dot{width:5px;height:5px;border-radius:50%}
.dot-online{background:#00e5cc;box-shadow:0 0 6px rgba(0,229,204,0.5);animation:dotPulseGreen 2s ease-in-out infinite}
.dot-cyan{background:#00e5cc;box-shadow:0 0 6px rgba(0,229,204,0.4);animation:dotPulseCyan 3s ease-in-out infinite}
@keyframes dotPulseGreen{0%,100%{opacity:0.5}50%{opacity:1}}
@keyframes dotPulseCyan{0%,100%{opacity:0.4}50%{opacity:0.9}}

/* ── Robot face container ── */
.robot-face-wrapper{position:fixed;top:46%;left:50%;transform:translate(-50%,-50%);z-index:6;perspective:800px;width:360px;height:420px;
  animation: bodyFloat 3s ease-in-out infinite}
.robot-face-container{width:360px;height:420px;transition:transform 0.2s ease-out;transform-style:preserve-3d;will-change:transform;
  animation: bodySway 4s ease-in-out infinite}
.robot-face-container svg{width:100%;height:100%;filter:drop-shadow(0 0 30px rgba(0,229,204,0.1))}

/* ── Body sway & float (breathing illusion) ── */
@keyframes bodySway{0%,100%{transform:rotate(0deg)}25%{transform:rotate(0.5deg)}75%{transform:rotate(-0.5deg)}}
@keyframes bodyFloat{0%,100%{margin-top:0}50%{margin-top:-2px}}

/* ── Circular audio visualizer ── */
.circular-visualizer{position:fixed;top:46%;left:50%;transform:translate(-50%,-50%);z-index:5;width:440px;height:440px;pointer-events:none}
.circular-visualizer .viz-bar{position:absolute;bottom:50%;left:50%;width:3px;background:#00e5cc;border-radius:2px;transform-origin:bottom center;opacity:0.4;transition:height 0.08s ease,opacity 0.1s ease}

/* ── Mic indicator ── */
.mic-indicator{position:fixed;bottom:80px;right:20px;z-index:25;display:flex;align-items:center;gap:8px;font-size:10px;letter-spacing:2px;color:#555}
.mic-icon{width:28px;height:28px;border-radius:50%;border:1px solid rgba(0,229,204,0.3);display:flex;align-items:center;justify-content:center;transition:all 0.3s ease;cursor:pointer;background:rgba(13,17,23,0.8)}
.mic-icon svg{width:14px;height:14px;fill:rgba(0,229,204,0.4)}
.mic-icon.active{border-color:#00e5cc;box-shadow:0 0 12px rgba(0,229,204,0.3);animation:micPulse 2s ease-in-out infinite}
.mic-icon.active svg{fill:#00e5cc}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(0,229,204,0.2)}50%{box-shadow:0 0 0 10px rgba(0,229,204,0)}}

/* ── Live transcript ── */
.live-transcript{position:fixed;bottom:120px;left:50%;transform:translateX(-50%);z-index:20;font-size:14px;letter-spacing:1px;color:rgba(0,229,204,0.5);font-family:'Share Tech Mono',monospace;text-align:center;max-width:70%;pointer-events:none;transition:opacity 0.3s ease;opacity:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.live-transcript.visible{opacity:1}

/* ── Terminal ── */
.terminal{position:fixed;bottom:0;left:0;width:100%;z-index:20;border-top:1px solid #1a2030;background:linear-gradient(180deg,rgba(13,17,23,0.92),rgba(13,17,23,0.98));padding:12px 30px}
.terminal::before{content:'';position:absolute;top:0;left:0;width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,107,53,0.5),rgba(0,229,204,0.4),rgba(255,107,53,0.5),transparent);animation:termBorderPulse 3s ease-in-out infinite}
@keyframes termBorderPulse{0%,100%{opacity:0.3}50%{opacity:1}}
.terminal-output{max-height:130px;overflow-y:auto;margin-bottom:6px;scrollbar-width:none}
.terminal-output::-webkit-scrollbar{display:none}
.terminal-output .line{font-size:12px;color:#666;line-height:1.6;letter-spacing:1px}
.terminal-output .line.response{color:#888}
.terminal-output .line.user-msg{color:#00e5cc;letter-spacing:1px}
.terminal-output .line.craws-msg{color:#ff6b35}
.terminal-output .line.system-msg{color:#555;font-style:italic}
.terminal-input{display:flex;align-items:center;gap:8px}
.terminal-input .prompt{font-size:12px;color:#ff4444;letter-spacing:2px;white-space:nowrap}
.terminal-input input{background:none;border:none;outline:none;color:#ccc;font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:1px;flex:1;caret-color:#ff4444}

/* ── Boot overlay ── */
.boot-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#0d1117;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity 0.8s ease}
.boot-overlay.hidden{opacity:0;pointer-events:none}
.boot-text{font-family:'Orbitron',sans-serif;font-size:14px;letter-spacing:4px;color:#ff4444;opacity:0;transition:opacity 0.5s ease}
.boot-text.visible{opacity:1}
.boot-circuit-line{position:absolute;height:1px;background:linear-gradient(90deg,transparent,#ff4444,transparent);opacity:0;transition:opacity 0.3s ease,width 0.5s ease}

/* ── Scan line ── */
.scan-line{position:fixed;top:-2px;left:0;width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,68,68,0.1),rgba(255,68,68,0.2),rgba(255,68,68,0.1),transparent);z-index:90;pointer-events:none;animation:scanDown 8s linear infinite}
@keyframes scanDown{0%{top:-2px}100%{top:100%}}

/* ── Fullscreen hint ── */
.fullscreen-hint{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:15;font-size:9px;letter-spacing:3px;color:#333;opacity:1;transition:opacity 1.5s ease;pointer-events:none}

/* ── Boot animation classes ── */
.boot-hidden{opacity:0 !important;transition:opacity 0.6s ease !important}
.boot-visible{opacity:1 !important}

/* ── Presentation Mode ── */
.presentation-overlay {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  z-index: 30;
  display: none;
  pointer-events: none;
}
.presentation-overlay.active { display: flex; align-items: center; justify-content: center; }
.presentation-slide {
  max-width: 60%;
  text-align: center;
  font-family: 'Orbitron', sans-serif;
  font-size: 24px;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.9);
  text-shadow: 0 0 20px rgba(0,229,204,0.3);
  line-height: 1.5;
}
.presentation-counter {
  position: fixed;
  top: 80px;
  right: 20px;
  font-family: 'Orbitron';
  font-size: 12px;
  color: #ff6b35;
  letter-spacing: 3px;
  z-index: 31;
  display: none;
}
.presentation-counter.active { display: block; }
.presentation-badge {
  position: fixed;
  top: 30px;
  right: 20px;
  font-family: 'Orbitron', sans-serif;
  font-size: 10px;
  letter-spacing: 2px;
  color: #ff6b35;
  background: rgba(13,17,23,0.9);
  border: 1px solid rgba(255,107,53,0.4);
  padding: 4px 10px;
  border-radius: 4px;
  z-index: 31;
  display: none;
  text-shadow: 0 0 8px rgba(255,107,53,0.3);
}
.presentation-badge.active { display: block; }

/* ── Responsive ── */
@media(max-width:768px){
  .robot-face-wrapper{width:260px;height:320px;top:40%}
  .robot-face-container{width:260px;height:320px}
  .circular-visualizer{width:320px;height:320px;top:40%}
  .title h1{font-size:12px;letter-spacing:3px}
  .status-panel{bottom:70px;left:10px;font-size:8px}
  .mic-indicator{bottom:70px;right:10px}
  .terminal{padding:10px 15px}
}
</style>
</head>
<body>

<!-- Scan line -->
<div class="scan-line"></div>

<!-- Circuit board background -->
<div class="circuit-bg">
<svg viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <line x1="100" y1="0" x2="100" y2="800" stroke="#cc2222" stroke-width="0.5"/>

</svg>
</div>

<!-- Binary rain -->
<div class="binary-rain" id="binaryRain"></div>

<!-- Title -->
<div class="title boot-hidden" id="titleBlock">
  <h1>OPENCRAWS // NEURAL ASSISTANT v2.0</h1>
  <div class="sub">CRUSTACEAN MECHA INTELLIGENCE SYSTEM</div>
</div>

<!-- Circular Audio Visualizer -->
<div class="circular-visualizer" id="circularVisualizer"></div>

<!-- Robot Face -->
<div class="robot-face-wrapper" id="robotFaceWrapper">
<div class="robot-face-container" id="robotFaceContainer">
<svg id="crawsFace" viewBox="0 0 360 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glowCyan">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowOrange">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="eyeGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="eyeGlowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,229,204,0.6)"/>
      <stop offset="100%" stop-color="rgba(0,229,204,0)"/>
    </radialGradient>
    <linearGradient id="shellGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="#cc2222"/>
    </linearGradient>
    <radialGradient id="bodyGrad" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#cc3333"/>
      <stop offset="60%" stop-color="#aa1111"/>
      <stop offset="100%" stop-color="#8b1a1a"/>
    </radialGradient>
    <!-- Clip paths for eyelids -->
    <clipPath id="leftEyeClip">
      <rect id="leftEyeClipRect" x="100" y="145" width="60" height="60"/>
    </clipPath>
    <clipPath id="rightEyeClip">
      <rect id="rightEyeClipRect" x="200" y="145" width="60" height="60"/>
    </clipPath>
  </defs>

  <!-- ═══ HEAD / SHELL (egg-shaped lobster body) ═══ -->
  <path d="M 75 200 Q 70 100 110 65 Q 145 40 180 38 Q 215 40 250 65 Q 290 100 285 200 Q 285 280 245 310 Q 210 335 180 340 Q 150 335 115 310 Q 75 280 75 200 Z"
    fill="url(#bodyGrad)" stroke="rgba(0,229,204,0.25)" stroke-width="1.2" id="headShell"/>
  <path d="M 85 195 Q 80 105 115 75 Q 148 50 180 48 Q 212 50 245 75 Q 280 105 275 195 Q 275 270 240 298 Q 210 320 180 325 Q 150 320 120 298 Q 85 270 85 195 Z"
    fill="none" stroke="rgba(0,229,204,0.1)" stroke-width="0.6"/>
  <path d="M 120 85 Q 150 60 180 55 Q 210 60 240 85" fill="none" stroke="rgba(0,229,204,0.2)" stroke-width="0.8"/>
  <path d="M 130 100 Q 155 78 180 73 Q 205 78 230 100" fill="none" stroke="rgba(0,229,204,0.12)" stroke-width="0.5"/>

  <!-- ═══ ANTENNAE / FEELERS ═══ -->
  <g id="antennaGroup">
    <!-- Left antenna -->
    <path id="antennaL" d="M 140 80 Q 120 40 100 20" fill="none" stroke="rgba(0,229,204,0.4)" stroke-width="1.5" stroke-linecap="round"
      style="transition: d 0.4s cubic-bezier(0.34,1.56,0.64,1)"/>
    <circle id="antennaTipL" cx="100" cy="20" r="4" fill="rgba(0,229,204,0.6)" filter="url(#glowCyan)"

    <!-- Right antenna -->
    <path id="antennaR" d="M 220 80 Q 240 40 260 20" fill="none" stroke="rgba(0,229,204,0.4)" stroke-width="1.5" stroke-linecap="round"
      style="transition: d 0.4s cubic-bezier(0.34,1.56,0.64,1)"/>
    <circle id="antennaTipR" cx="260" cy="20" r="4" fill="rgba(0,229,204,0.6)" filter="url(#glowCyan)"
      style="transition: cx 0.4s cubic-bezier(0.34,1.56,0.64,1), cy 0.4s cubic-bezier(0.34,1.56,0.64,1)"/>
  </g>

  <!-- ═══ ARMOR PLATE LINES (cheeks) ═══ -->
  <line x1="88" y1="180" x2="95" y2="230" stroke="rgba(0,229,204,0.12)" stroke-width="0.5"/>

  <!-- ═══ EYEBROW RIDGES ═══ -->
  <path id="browL" d="M 108 148 Q 130 140 152 148" fill="none" stroke="rgba(0,229,204,0.35)" stroke-width="1.5" stroke-linecap="round"

  <path id="browR" d="M 208 148 Q 230 140 252 148" fill="none" stroke="rgba(0,229,204,0.35)" stroke-width="1.5" stroke-linecap="round"

  <!-- ═══ EYES ═══ -->

  <circle cx="230" cy="175" r="30" fill="url(#eyeGlowGrad)" filter="url(#strongGlow)" opacity="0.4" class="eye-ambient"/>

  <!-- Left eye group with eyelid clipping -->

  <!-- Upper eyelid left (drawn OVER the eye, outside clip) -->

  <!-- Upper eyelid right -->

  <!-- ═══ ORGANIC MOUTH ═══ -->
  <g id="mouthGroup" style="transform-origin: 180px 270px">
    <!-- Chin area that shifts down when mouth opens -->
    <g id="chinGroup" style="transition: transform 0.25s ease">
      <path d="M 130 310 Q 155 330 180 335 Q 205 330 230 310" fill="none" stroke="rgba(0,229,204,0.1)" stroke-width="0.5"/>

    <!-- Upper lip arc -->
    <path id="upperLip" d="M 150 265 Q 165 260 180 262 Q 195 260 210 265"

    <!-- Mouth opening (ellipse) -->
    <ellipse id="mouth" cx="180" cy="267" rx="22" ry="1"
      fill="rgba(0,180,160,0.15)" stroke="rgba(0,229,204,0.3)" stroke-width="0.8"

    <!-- Lower lip arc -->
    <path id="lowerLip" d="M 152 269 Q 166 273 180 274 Q 194 273 208 269"
      fill="none" stroke="rgba(0,180,160,0.4)" stroke-width="1" stroke-linecap="round"
      style="transition: d 0.2s ease"/>
  </g>

  <!-- ═══ CLAW DECORATIONS ═══ -->
  <!-- Left claw -->
  <g id="leftClaw" style="transform-origin: 50px 220px; transition: transform 0.4s cubic-bezier(0.34,1.2,0.64,1)">
    <path d="M 70 185 Q 45 175 25 190 Q 15 200 20 210 L 55 205" fill="#ff4444" stroke="rgba(204,34,34,0.6)" stroke-width="1" stroke-linejoin="round"/>

<script>
// ==============================================================
// API CONFIGURATION
// ==============================================================
const API_BASE = window.location.hostname === 'localhost'
  ? 'http://localhost:10000'
  : 'https://arcanjobot.onrender.com';

// ==============================================================
// GROQ API CONFIGURATION
// ==============================================================
const GROQ_API_KEY = new URLSearchParams(window.location.search).get('key') || localStorage.getItem('groq_key') || prompt('Digite sua Groq API Key:') || '';
if (GROQ_API_KEY && !localStorage.getItem('groq_key')) localStorage.setItem('groq_key', GROQ_API_KEY);
const GROQ_API_URL = 'https://api.groq.com/openai/v1/chat/completions';
const GROQ_MODEL = 'llama-3.3-70b-versatile';

const CRAWS_SYSTEM_PROMPT = `Voce e o Opencraws, um robo assistente crustaceo futurista. Voce e energico, divertido e eficiente. Voce adora ajudar pessoas com tecnologia. Voce faz piadas nerds de vez em quando. Voce se refere ao usuario como "chefe" ou "capitao". Suas respostas sao curtas e diretas (1-2 frases). Voce fala em portugues brasileiro com girias tech.`;

const conversationHistory = [];
const MAX_HISTORY = 10;

// ==============================================================
// STATE
// ==============================================================
let crawsState = 'idle'; // idle, listening, thinking, speaking
let isSpeaking = false;
let isProcessingCommand = false;
let micEnabled = false;
let recognition = null;
let currentEmotion = 'neutral';

// ==============================================================
// DOM REFERENCES
// ==============================================================
const pupilL = document.getElementById('pupilL');
const pupilR = document.getElementById('pupilR');
const irisL = document.getElementById('irisL');
const irisR = document.getElementById('irisR');
const leftEyeGroup = document.getElementById('leftEyeGroup');
const rightEyeGroup = document.getElementById('rightEyeGroup');
const robotFaceContainer = document.getElementById('robotFaceContainer');
const leftClaw = document.getElementById('leftClaw');
const rightClaw = document.getElementById('rightClaw');
const antennaL = document.getElementById('antennaL');
const antennaR = document.getElementById('antennaR');
const antennaTipL = document.getElementById('antennaTipL');
const antennaTipR = document.getElementById('antennaTipR');
const termInput = document.getElementById('termInput');
const termOutput = document.getElementById('termOutput');
const mouth = document.getElementById('mouth');
const upperLip = document.getElementById('upperLip');
const lowerLip = document.getElementById('lowerLip');
const chinGroup = document.getElementById('chinGroup');
const browL = document.getElementById('browL');
const browR = document.getElementById('browR');
const eyelidL = document.getElementById('eyelidL');
const eyelidR = document.getElementById('eyelidR');
const leftEyeClipRect = document.getElementById('leftEyeClipRect');
const rightEyeClipRect = document.getElementById('rightEyeClipRect');

// ==============================================================
// UTILITY
// ==============================================================
function lerp(current, target, speed) {
  return current + (target - current) * speed;
}

// ==============================================================
// BINARY RAIN
// ==============================================================
const binaryRain = document.getElementById('binaryRain');
for (let i = 0; i < 30; i++) {
  const digit = document.createElement('div');
  digit.className = 'binary-digit';
  digit.textContent = Math.random() > 0.5 ? '1' : '0';
  digit.style.left = Math.random() * 100 + '%';
  digit.style.animationDuration = (10 + Math.random() * 20) + 's';
  digit.style.animationDelay = (Math.random() * 15) + 's';
  digit.style.fontSize = (10 + Math.random() * 6) + 'px';
  binaryRain.appendChild(digit);
}

// ==============================================================
// CIRCULAR AUDIO VISUALIZER
// ==============================================================
const circularViz = document.getElementById('circularVisualizer');
const NUM_CIRC_BARS = 36;
const circBars = [];

for (let i = 0; i < NUM_CIRC_BARS; i++) {
  const bar = document.createElement('div');
  bar.className = 'viz-bar';
  const angle = (i / NUM_CIRC_BARS) * 360;
  const radAngle = (angle * Math.PI) / 180;
  const radius = 200;
  const cx = 220 + Math.cos(radAngle) * radius - 1.5;
  const cy = 220 + Math.sin(radAngle) * radius;
  bar.style.left = cx + 'px';
  bar.style.top = cy + 'px';
  bar.style.height = '4px';
  bar.style.width = '3px';
  bar.style.transform = `rotate(${angle + 90}deg)`;
  bar.style.transformOrigin = 'bottom center';
  circularViz.appendChild(bar);
  circBars.push(bar);
}

let circVizActive = false;
let circVizFrame = null;
const lerpCircBars = new Array(NUM_CIRC_BARS).fill(4);

function animateCircularViz(mode) {
  circVizActive = true;
  function tick() {
    if (!circVizActive) {
      circBars.forEach(b => b.style.height = '4px');
      return;
    }
    circBars.forEach((bar, i) => {
      let h;
      if (mode === 'speaking') {
        h = 4 + Math.random() * 25 * Math.sin((Date.now() / 150 + i * 0.5)) ** 2;
      } else if (mode === 'listening') {
        h = 4 + Math.random() * 10;
      } else {
        h = 4 + Math.random() * 3;
      }
      bar.style.height = Math.max(4, h) + 'px';
      bar.style.opacity = Math.min(1, 0.3 + h / 30);
    });
    circVizFrame = requestAnimationFrame(tick);
  }
  tick();
}

function stopCircularViz() {
  circVizActive = false;
  if (circVizFrame) cancelAnimationFrame(circVizFrame);
  circBars.forEach(b => { b.style.height = '4px'; b.style.opacity = '0.2'; });
}

// ==============================================================
// ORGANIC MOUTH SYSTEM
// ==============================================================
let mouthAnimFrame = null;
let lerpMouthRY = 1;
let lerpMouthRX = 22;

// Set mouth shape based on volume (0-1)
function setMouthVolume(volume) {
  const targetRY = volume * 12;
  const targetRX = 18 + volume * 8;
  lerpMouthRY = lerp(lerpMouthRY, targetRY, 0.3);
  lerpMouthRX = lerp(lerpMouthRX, targetRX, 0.3);

  mouth.setAttribute('ry', Math.max(1, lerpMouthRY));
  mouth.setAttribute('rx', lerpMouthRX);

  // Upper lip curves up with volume
  const lipLift = Math.min(volume * 5, 4);
  upperLip.setAttribute('d', `M 150 ${265 - lipLift} Q 165 ${258 - lipLift} 180 ${260 - lipLift} Q 195 ${258 - lipLift} 210 ${265 - lipLift}`);

  // Lower lip curves down with volume
  const lipDrop = Math.min(volume * 6, 5);
  lowerLip.setAttribute('d', `M 152 ${269 + lipDrop} Q 166 ${273 + lipDrop * 1.2} 180 ${274 + lipDrop * 1.3} Q 194 ${273 + lipDrop * 1.2} 208 ${269 + lipDrop}`);

  // Mouth fill opacity increases with opening
  const fillAlpha = 0.15 + volume * 0.4;
  mouth.setAttribute('fill', `rgba(0,180,160,${fillAlpha})`);

  // Chin shifts down slightly when mouth opens wide
  const chinShift = Math.min(volume * 4, 3);
  chinGroup.style.transform = `translateY(${chinShift}px)`;
}

// Multi-sine speaking animation (like jarvis.html)
function startMouthAnimation() {
  isSpeaking = true;
  let t = 0;
  function animateMouth() {
    if (!isSpeaking) {
      mouth.setAttribute('ry', '1');
      mouth.setAttribute('rx', '22');
      upperLip.setAttribute('d', 'M 150 265 Q 165 260 180 262 Q 195 260 210 265');
      lowerLip.setAttribute('d', 'M 152 269 Q 166 273 180 274 Q 194 273 208 269');
      chinGroup.style.transform = 'translateY(0)';
      mouth.setAttribute('fill', 'rgba(0,180,160,0.15)');
      return;
    }
    t += 0.12;
    // Multi-sine pattern for organic speech
    const wave1 = Math.abs(Math.sin(t * 2.5));
    const wave2 = Math.abs(Math.sin(t * 3.7 + 0.5));
    const wave3 = Math.abs(Math.sin(t * 1.3 + 1.2));
    const combined = wave1 * 0.5 + wave2 * 0.3 + wave3 * 0.2;

    setMouthVolume(combined);

    mouthAnimFrame = requestAnimationFrame(animateMouth);
  }
  animateMouth();
}

function stopMouthAnimation() {
  isSpeaking = false;
  if (mouthAnimFrame) cancelAnimationFrame(mouthAnimFrame);
  lerpMouthRY = 1;
  lerpMouthRX = 22;
  mouth.setAttribute('ry', '1');
  mouth.setAttribute('rx', '22');
  upperLip.setAttribute('d', 'M 150 265 Q 165 260 180 262 Q 195 260 210 265');
  lowerLip.setAttribute('d', 'M 152 269 Q 166 273 180 274 Q 194 273 208 269');
  chinGroup.style.transform = 'translateY(0)';
  mouth.setAttribute('fill', 'rgba(0,180,160,0.15)');
}

// ==============================================================
// EYELID SYSTEM
// ==============================================================
// eyelidLevel: 0 = fully open, 1 = fully closed
let currentEyelidL = 0;
let currentEyelidR = 0;

function setEyelids(levelL, levelR) {
  currentEyelidL = levelL;
  currentEyelidR = levelR;

  // Eyelid path: when open, it sits at the top edge of the eye; when closed, it covers the eye center
  // The eyelid is a filled area from the top of the eye socket down to the eyelid line
  const eyeTop = 147; // top of eye socket
  const eyeCenter = 175;
  const eyeBottom = 203;

  // Left eyelid: moves from top to cover more of the eye
  const lidYL = eyeTop + (eyeCenter - eyeTop + 5) * levelL;
  eyelidL.setAttribute('d', `M 102 ${eyeTop} L 102 ${lidYL} Q 130 ${lidYL + 4 * levelL} 158 ${lidYL} L 158 ${eyeTop} Z`);

  // Right eyelid
  const lidYR = eyeTop + (eyeCenter - eyeTop + 5) * levelR;
  eyelidR.setAttribute('d', `M 202 ${eyeTop} L 202 ${lidYR} Q 230 ${lidYR + 4 * levelR} 258 ${lidYR} L 258 ${eyeTop} Z`);
}

// Initialize eyelids as open
setEyelids(0, 0);

// ==============================================================
// CLAW GESTURE SYSTEM
// ==============================================================
let clawAnimFrame = null;
let clawAnimActive = false;
let clawGestureFrame = null;
let clawGestureActive = false;

function startClawThinking() {
  clawAnimActive = true;
  let t = 0;
  function animateClaws() {
    if (!clawAnimActive) {
      leftClaw.style.transform = '';
      rightClaw.style.transform = '';
      return;
    }
    t += 0.03;
    const open = Math.sin(t * 2) * 8;
    leftClaw.style.transform = `rotate(${-open}deg)`;
    rightClaw.style.transform = `rotate(${open}deg)`;
    clawAnimFrame = requestAnimationFrame(animateClaws);
  }
  animateClaws();
}

function stopClawThinking() {
  clawAnimActive = false;
  if (clawAnimFrame) cancelAnimationFrame(clawAnimFrame);
  leftClaw.style.transform = '';
  rightClaw.style.transform = '';
}

// Speaking claw gestures: rhythmic open/close with volume, occasional point
function startClawGestures() {
  clawGestureActive = true;
  let t = 0;
  let gestureTimer = 0;
  let currentGesture = 'rhythm'; // rhythm, pointLeft, pointRight, bothUp

  function tick() {
    if (!clawGestureActive) {
      leftClaw.style.transform = '';
      rightClaw.style.transform = '';
      return;
    }
    t += 0.04;
    gestureTimer++;

    // Change gesture every ~2-4 seconds
    if (gestureTimer % 150 === 0) {
      const gestures = ['rhythm', 'pointLeft', 'pointRight', 'rhythm', 'rhythm'];
      currentGesture = gestures[Math.floor(Math.random() * gestures.length)];
    }

    switch (currentGesture) {
      case 'rhythm': {
        const openL = Math.sin(t * 3) * 6 + Math.sin(t * 5) * 3;
        const openR = Math.sin(t * 3 + 0.5) * 6 + Math.sin(t * 5 + 0.3) * 3;
        leftClaw.style.transform = `rotate(${-openL}deg)`;
        rightClaw.style.transform = `rotate(${openR}deg)`;
        break;
      }
      case 'pointLeft': {
        const target = -15;
        const swing = Math.sin(t * 2) * 3;
        leftClaw.style.transform = `rotate(${target + swing}deg)`;
        rightClaw.style.transform = `rotate(${Math.sin(t * 3) * 4}deg)`;
        break;
      }
      case 'pointRight': {
        const target = 15;
        const swing = Math.sin(t * 2) * 3;
        rightClaw.style.transform = `rotate(${target + swing}deg)`;
        leftClaw.style.transform = `rotate(${-Math.sin(t * 3) * 4}deg)`;
        break;
      }
    }

    clawGestureFrame = requestAnimationFrame(tick);
  }
  tick();
}

function stopClawGestures() {
  clawGestureActive = false;
  if (clawGestureFrame) cancelAnimationFrame(clawGestureFrame);
  leftClaw.style.transform = '';
  rightClaw.style.transform = '';
}

// Idle claw subtle movement
let idleClawT = 0;
function idleClawMovement() {
  if (crawsState === 'idle' && !clawAnimActive && !clawGestureActive) {
    idleClawT += 0.01;
    const subtle = Math.sin(idleClawT) * 2;
    leftClaw.style.transform = `rotate(${-subtle}deg)`;
    rightClaw.style.transform = `rotate(${subtle}deg)`;
  }
  requestAnimationFrame(idleClawMovement);
}
idleClawMovement();

// ==============================================================
// ANTENNA SYSTEM (physics-based with spring/bounce)
// ==============================================================

function setAntennaState(state) {
  switch (state) {
    case 'perked': // interested / listening
      antennaL.setAttribute('d', 'M 140 80 Q 125 30 110 5');
      antennaTipL.setAttribute('cx', '110');
      antennaTipL.setAttribute('cy', '5');
      antennaR.setAttribute('d', 'M 220 80 Q 235 30 250 5');
      antennaTipR.setAttribute('cx', '250');
      antennaTipR.setAttribute('cy', '5');
      break;
    case 'drooping': // sad / thinking
      antennaL.setAttribute('d', 'M 140 80 Q 115 55 95 45');
      antennaTipL.setAttribute('cx', '95');
      antennaTipL.setAttribute('cy', '45');
      antennaR.setAttribute('d', 'M 220 80 Q 245 55 265 45');
      antennaTipR.setAttribute('cx', '265');
      antennaTipR.setAttribute('cy', '45');
      break;
    case 'excited': // wiggling
      startAntennaWiggle();
      return;
    case 'idle':
    default:
      antennaL.setAttribute('d', 'M 140 80 Q 120 40 100 20');
      antennaTipL.setAttribute('cx', '100');
      antennaTipL.setAttribute('cy', '20');
      antennaR.setAttribute('d', 'M 220 80 Q 240 40 260 20');
      antennaTipR.setAttribute('cx', '260');
      antennaTipR.setAttribute('cy', '20');
      break;
  }
}

let antennaWiggleFrame = null;
let antennaWiggleActive = false;

function startAntennaWiggle() {
  antennaWiggleActive = true;
  let t = 0;
  function wiggle() {
    if (!antennaWiggleActive) return;
    t += 0.15;
    const oscL = Math.sin(t * 4) * 8;
    const oscR = Math.sin(t * 4 + Math.PI) * 8;
    antennaL.setAttribute('d', `M 140 80 Q ${120 + oscL} 40 ${100 + oscL} 20`);
    antennaTipL.setAttribute('cx', 100 + oscL);
    antennaR.setAttribute('d', `M 220 80 Q ${240 + oscR} 40 ${260 + oscR} 20`);
    antennaTipR.setAttribute('cx', 260 + oscR);
    antennaWiggleFrame = requestAnimationFrame(wiggle);
  }
  wiggle();
}

function stopAntennaWiggle() {
  antennaWiggleActive = false;
  if (antennaWiggleFrame) cancelAnimationFrame(antennaWiggleFrame);
  setAntennaState('idle');
}

// Idle antenna twitch: one antenna twitches occasionally
let antennaTwitchTimer = null;
function scheduleAntennaTwitch() {
  antennaTwitchTimer = setTimeout(() => {
    if (crawsState === 'idle') {
      twitchAntenna();
    }
    scheduleAntennaTwitch();
  }, 5000 + Math.random() * 8000);
}
scheduleAntennaTwitch();

function twitchAntenna() {
  // Quick twitch of left antenna
  antennaL.style.transition = 'none';
  antennaL.setAttribute('d', 'M 140 80 Q 115 35 90 25');
  antennaTipL.style.transition = 'none';
  antennaTipL.setAttribute('cx', '90');
  antennaTipL.setAttribute('cy', '25');
  setTimeout(() => {
    antennaL.style.transition = 'd 0.4s cubic-bezier(0.34,1.56,0.64,1)';
    antennaTipL.style.transition = 'cx 0.4s cubic-bezier(0.34,1.56,0.64,1), cy 0.4s cubic-bezier(0.34,1.56,0.64,1)';
    antennaL.setAttribute('d', 'M 140 80 Q 120 40 100 20');
    antennaTipL.setAttribute('cx', '100');
    antennaTipL.setAttribute('cy', '20');
  }, 200);
}

// ==============================================================
// EYE ANIMATIONS
// ==============================================================

// Blink
let suppressBlinks = false;
function randomBlink() {
  if (suppressBlinks) {
    setTimeout(randomBlink, 5000 + Math.random() * 3000);
    return;
  }
  // Use eyelids for blinking instead of scaleY
  setEyelids(1, 1);
  setTimeout(() => {
    // Restore eyelids to current emotion level
    const emotionLids = getEmotionEyelids(currentEmotion);
    setEyelids(emotionLids.left, emotionLids.right);
  }, 120);
  setTimeout(randomBlink, 2500 + Math.random() * 4000);
}
setTimeout(randomBlink, 3000);

function getEmotionEyelids(emotion) {
  switch (emotion) {
    case 'happy': return { left: 0.3, right: 0.3 }; // squinted
    case 'thinking': return { left: 0.1, right: 0.35 }; // one half-closed
    case 'surprised': return { left: 0, right: 0 }; // wide open
    case 'listening': return { left: 0, right: 0 };
    case 'speaking': return { left: 0.05, right: 0.05 };
    default: return { left: 0.05, right: 0.05 };
  }
}

// Eye follow mouse (parallax)
let parallaxRotY = 0, parallaxRotX = 0;

document.addEventListener('mousemove', (ev) => {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  const dx = (ev.clientX - cx) / cx;
  const dy = (ev.clientY - cy) / cy;

  parallaxRotY = dx * 6;
  parallaxRotX = -dy * 4;
  if (crawsState !== 'speaking') {
    robotFaceContainer.style.transform = `rotateY(${parallaxRotY}deg) rotateX(${parallaxRotX}deg)`;
  }

  // Pupils follow mouse
  if (crawsState === 'idle' || crawsState === 'listening') {
    const pupilShiftX = dx * 4;
    const pupilShiftY = dy * 3;
    pupilL.setAttribute('cx', 130 + pupilShiftX);
    pupilR.setAttribute('cx', 230 + pupilShiftX);
    pupilL.setAttribute('cy', 175 + pupilShiftY);
    pupilR.setAttribute('cy', 175 + pupilShiftY);
    irisL.setAttribute('cx', 130 + pupilShiftX);
    irisR.setAttribute('cx', 230 + pupilShiftX);
  }
});

// Idle eye drift
function idleEyeDrift() {
  if (crawsState !== 'idle') {
    setTimeout(idleEyeDrift, 2000);
    return;
  }
  const driftX = (Math.random() - 0.5) * 5;
  const driftY = (Math.random() - 0.5) * 3;
  pupilL.setAttribute('cx', 130 + driftX);
  pupilR.setAttribute('cx', 230 + driftX);
  pupilL.setAttribute('cy', 175 + driftY);
  pupilR.setAttribute('cy', 175 + driftY);
  irisL.setAttribute('cx', 130 + driftX);
  irisR.setAttribute('cx', 230 + driftX);
  setTimeout(idleEyeDrift, 3000 + Math.random() * 4000);
}
setTimeout(idleEyeDrift, 5000);

// Eye pulse during speaking
let eyePulseFrame = null;
function startEyePulse() {
  let t = 0;
  function pulse() {
    if (crawsState !== 'speaking') return;
    t += 0.08;
    const size = 8 + Math.abs(Math.sin(t * 2.5)) * 3;
    pupilL.setAttribute('r', size);
    pupilR.setAttribute('r', size);
    eyePulseFrame = requestAnimationFrame(pulse);
  }
  pulse();
}

function stopEyePulse() {
  if (eyePulseFrame) cancelAnimationFrame(eyePulseFrame);
  pupilL.setAttribute('r', '8');
  pupilR.setAttribute('r', '8');
}

// ==============================================================
// HEAD BOBBING SYSTEM (while speaking)
// ==============================================================
let headBobFrame = null;
let headBobActive = false;
let headBobT = 0;
let currentHeadTilt = 0;
let targetHeadTilt = 0;
let lastTiltChange = 0;

function startHeadBob() {
  headBobActive = true;
  headBobT = 0;
  targetHeadTilt = (Math.random() - 0.5) * 3; // +-1.5 deg
  lastTiltChange = Date.now();

  function bob() {
    if (!headBobActive) {
      robotFaceContainer.style.transform = `rotateY(${parallaxRotY}deg) rotateX(${parallaxRotX}deg)`;
      return;
    }
    headBobT += 0.08;
    const now = Date.now();

    // Change tilt direction every 0.5s
    if (now - lastTiltChange > 500) {
      targetHeadTilt = (Math.random() - 0.5) * 3;
      lastTiltChange = now;
    }
    currentHeadTilt = lerp(currentHeadTilt, targetHeadTilt, 0.08);

    // Y-axis bob synced to "syllables"
    const bobY = Math.sin(headBobT * 4) * 3;

    robotFaceContainer.style.transform = `rotateY(${parallaxRotY + currentHeadTilt}deg) rotateX(${parallaxRotX}deg) translateY(${bobY}px) rotate(${currentHeadTilt * 0.3}deg)`;

    headBobFrame = requestAnimationFrame(bob);
  }
  bob();
}

function stopHeadBob() {
  headBobActive = false;
  if (headBobFrame) cancelAnimationFrame(headBobFrame);
  currentHeadTilt = 0;
  robotFaceContainer.style.transform = `rotateY(${parallaxRotY}deg) rotateX(${parallaxRotX}deg)`;
}

// ==============================================================
// MICRO-EXPRESSIONS SYSTEM
// ==============================================================
let microExprFrame = null;
let microExprActive = false;

// Listening micro-expressions: nods, eye tracking, mouth micro-movements
function startListeningMicroExpressions() {
  microExprActive = true;
  let lastNod = Date.now();
  let nodding = false;

  function tick() {
    if (!microExprActive) return;
    const now = Date.now();

    // Occasional small nod every 2-4 seconds
    if (!nodding && now - lastNod > 2000 + Math.random() * 2000) {
      nodding = true;
      lastNod = now;
      // Small nod: tilt down then back up
      robotFaceContainer.style.transition = 'transform 0.2s ease';
      robotFaceContainer.style.transform = `rotateY(${parallaxRotY}deg) rotateX(${parallaxRotX + 3}deg)`;
      setTimeout(() => {
        if (microExprActive) {
          robotFaceContainer.style.transform = `rotateY(${parallaxRotY}deg) rotateX(${parallaxRotX}deg)`;
        }
        nodding = false;
      }, 300);
    }

    // Small mouth movements as if about to respond
    if (Math.random() < 0.02) {
      mouth.setAttribute('ry', '2');
      setTimeout(() => {
        if (microExprActive) mouth.setAttribute('ry', '1');
      }, 200);
    }

    microExprFrame = requestAnimationFrame(tick);
  }
  tick();
}

function stopListeningMicroExpressions() {
  microExprActive = false;
  if (microExprFrame) cancelAnimationFrame(microExprFrame);
}

      setEyelids(lids.left, lids.right);

      pupilR.setAttribute('r', '10');

}

// ==============================================================
// SPEECH SYNTHESIS
// ==============================================================
let selectedVoice = null;

function loadVoices() {
  const voices = speechSynthesis.getVoices();
  selectedVoice = voices.find(v => v.lang === 'pt-BR' && v.name.toLowerCase().includes('male'))
    || voices.find(v => v.lang === 'pt-BR')
    || voices.find(v => v.lang.startsWith('pt'))
    || voices.find(v => v.name.includes('Google UK English Male'))
    || voices.find(v => v.lang.startsWith('en'))
    || voices[0];
}

speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

function speak(text, onDone) {
  speechSynthesis.cancel();
  const sentences = text.split(/(?<=\.)\s+/).filter(s => s.trim());

  crawsState = 'speaking';
  setEmotion('speaking');
  startMouthAnimation();
  startEyePulse();
  startHeadBob();
  startClawGestures();
  animateCircularViz('speaking');
  stopListeningMicroExpressions();

  let sentenceIdx = 0;

  function speakNext() {
    if (sentenceIdx >= sentences.length) {
      stopMouthAnimation();
      stopEyePulse();
      stopHeadBob();
      stopClawGestures();
      stopCircularViz();
      stopAntennaWiggle();
      crawsState = 'idle';
      setEmotion('neutral');
      if (onDone) onDone();
      return;
    }

    const utter = new SpeechSynthesisUtterance(sentences[sentenceIdx]);
    if (selectedVoice) utter.voice = selectedVoice;
    utter.rate = 1.0;
    utter.pitch = 0.9;
    utter.volume = 1;

    utter.onend = () => {
      sentenceIdx++;
      if (sentenceIdx < sentences.length) {
        setTimeout(speakNext, 200);
      } else {
        speakNext();
      }
    };

    utter.onerror = () => {
      stopMouthAnimation();
      stopEyePulse();
      stopHeadBob();
      stopClawGestures();
      stopCircularViz();
      stopAntennaWiggle();
      crawsState = 'idle';
      setEmotion('neutral');
      if (onDone) onDone();
    };

    speechSynthesis.speak(utter);
  }

  speakNext();
}

// ==============================================================
// TERMINAL
// ==============================================================
function addLine(text, cls = '') {
  const div = document.createElement('div');
  div.className = 'line ' + cls;
  div.textContent = text;
  termOutput.appendChild(div);
  termOutput.scrollTop = termOutput.scrollHeight;
  while (termOutput.children.length > 50) {
    termOutput.removeChild(termOutput.firstChild);
  }
}

function addLineTyped(text, cls = '', onComplete) {
  const div = document.createElement('div');
  div.className = 'line ' + cls;
  termOutput.appendChild(div);
  let charIdx = 0;
  const interval = setInterval(() => {
    div.textContent = text.slice(0, charIdx + 1);
    charIdx++;
    termOutput.scrollTop = termOutput.scrollHeight;
    if (charIdx >= text.length) {
      clearInterval(interval);
      if (onComplete) onComplete();
    }
  }, 15);
}

// ==============================================================
// GROQ API
// ==============================================================
const fallbackResponses = [
  'Opa chefe, meus circuitos de comunicacao tao com lag. Tenta de novo em uns segundos!',
  'Caramba capitao, perdi a conexao com o servidor. Mas ainda to aqui firme e forte!',
  'Bug na matrix, chefe! Conexao caiu, mas meus processadores locais tao de pe.'
];

async function getGroqResponse(userMessage) {
  conversationHistory.push({ role: 'user', content: userMessage });
  while (conversationHistory.length > MAX_HISTORY) {
    conversationHistory.shift();
  }

  const messages = [
    { role: 'system', content: CRAWS_SYSTEM_PROMPT },
    ...conversationHistory
  ];

  try {
    const response = await fetch(GROQ_API_URL, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${GROQ_API_KEY}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: GROQ_MODEL,
        messages: messages,
        max_tokens: 200,
        temperature: 0.8
      })
    });

    if (!response.ok) throw new Error(`API error: ${response.status}`);

    const data = await response.json();
    const assistantMessage = data.choices[0].message.content.trim();
    conversationHistory.push({ role: 'assistant', content: assistantMessage });
    return assistantMessage;
  } catch (error) {
    console.error('Groq API error:', error);
    const fallback = fallbackResponses[Math.floor(Math.random() * fallbackResponses.length)];
    conversationHistory.push({ role: 'assistant', content: fallback });
    return fallback;
  }
}

// ==============================================================
// DETECT EMOTION FROM RESPONSE
// ==============================================================
function detectResponseEmotion(text) {
  const exclamations = (text.match(/!/g) || []).length;
  const questions = (text.match(/\?/g) || []).length;
  const upper = text === text.toUpperCase();
  const happyWords = /haha|kk|rsrs|boa|legal|massa|top|show|maneiro|dahora/i;
  const thinkWords = /hmm|vamos ver|deixa eu pensar|analisando|processando/i;
  const surpriseWords = /caramba|eita|uau|nossa|pow|putz|mds/i;

  if (surpriseWords.test(text) || (exclamations >= 3)) return 'surprised';
  if (happyWords.test(text) || (exclamations >= 2 && !upper)) return 'happy';
  if (thinkWords.test(text) || questions >= 2) return 'thinking';
  return 'neutral';
}

// ==============================================================
// PROCESS USER INPUT
// ==============================================================
async function processUserInput(text) {
  if (!text.trim() || isProcessingCommand) return;
  isProcessingCommand = true;

  addLine('VOCE > ' + text, 'user-msg');

  // Save to PostgreSQL
  fetch(API_BASE + '/api/vision/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ userId: 'opencraws-web', role: 'user', content: text })
  }).catch(() => {});

  // Thinking state
  crawsState = 'thinking';
  setEmotion('thinking');
  startClawThinking();
  addLine('Processando...', 'system-msg');

  try {
    const response = await getGroqResponse(text);

    stopClawThinking();

    // Remove "Processando..." line
    const lines = termOutput.querySelectorAll('.line.system-msg');
    const lastSys = lines[lines.length - 1];
    if (lastSys && lastSys.textContent === 'Processando...') lastSys.remove();

    // Save response to PostgreSQL
    fetch(API_BASE + '/api/vision/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId: 'opencraws-web', role: 'assistant', content: response })
    }).catch(() => {});

    // Detect emotion from response
    const emotion = detectResponseEmotion(response);

    addLineTyped('[CRAWS] ' + response, 'craws-msg', () => {
      // Flash the detected emotion briefly before speaking
      if (emotion !== 'neutral') {
        setEmotion(emotion);
        setTimeout(() => {
          if (crawsState === 'speaking') setEmotion('speaking');
        }, 800);
      }

      speak(response, () => {
        isProcessingCommand = false;
        if (micEnabled && recognition) {
          try { recognition.start(); } catch(e) {}
        }
      });
    });
  } catch (error) {
    stopClawThinking();

    const lines = termOutput.querySelectorAll('.line.system-msg');
    const lastSys = lines[lines.length - 1];
    if (lastSys && lastSys.textContent === 'Processando...') lastSys.remove();

    const fallback = 'Eita chefe, deu um curto-circuito aqui! Tenta de novo?';
    addLine('[CRAWS] ' + fallback, 'craws-msg');
    speak(fallback, () => {
      isProcessingCommand = false;
      if (micEnabled && recognition) {
        try { recognition.start(); } catch(e) {}
      }
    });
  }
}

// Text input handler
termInput.addEventListener('keydown', (ev) => {
  if (ev.key !== 'Enter') return;
  const text = termInput.value.trim();
  if (!text) return;
  termInput.value = '';

  // Intercept for presentation mode topic
  if (presentationAwaitingTopic) {
    presentationAwaitingTopic = false;
    addLine('VOCE > [TEMA] ' + text, 'user-msg');
    runPresentation(text);
    return;
  }

  processUserInput(text);
});

  if (ev.target !== termInput && !ev.ctrlKey && !ev.altKey && !ev.metaKey && ev.key.length === 1) {

    if (ev.key === 'p' || ev.key === 'P') return;

});

// ==============================================================
// REAL-TIME AUDIO ANALYSIS
// ==============================================================
let micAudioCtx = null;
let micAnalyser = null;
let micSource = null;
let micStream = null;
let realtimeAnimFrame = null;
let realtimeActive = false;
let lerpVolume = 0;

const liveTranscript = document.getElementById('liveTranscript');
const liveTranscriptText = document.getElementById('liveTranscriptText');

async function startRealtimeAudio() {
  if (realtimeActive) return;
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    micAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    micSource = micAudioCtx.createMediaStreamSource(micStream);
    micAnalyser = micAudioCtx.createAnalyser();
    micAnalyser.fftSize = 256;
    micAnalyser.smoothingTimeConstant = 0.3;
    micSource.connect(micAnalyser);
    realtimeActive = true;
    realtimeAudioLoop();
  } catch (err) {
    console.error('Failed to start realtime audio:', err);
  }
}

function stopRealtimeAudio() {
  realtimeActive = false;
  if (realtimeAnimFrame) {
    cancelAnimationFrame(realtimeAnimFrame);
    realtimeAnimFrame = null;
  }
  if (micStream) {
    micStream.getTracks().forEach(t => t.stop());
    micStream = null;
  }
  if (micAudioCtx) {
    micAudioCtx.close().catch(() => {});
    micAudioCtx = null;
  }
  micAnalyser = null;
  micSource = null;
  lerpVolume = 0;
  suppressBlinks = false;
  liveTranscript.classList.remove('visible');
  liveTranscriptText.textContent = '';
}

function realtimeAudioLoop() {
  if (!realtimeActive || !micAnalyser) return;

  const dataArray = new Uint8Array(micAnalyser.frequencyBinCount);
  micAnalyser.getByteFrequencyData(dataArray);

  const avg = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;
  const rawVolume = avg / 255;
  lerpVolume = lerp(lerpVolume, rawVolume, 0.3);
  const volume = lerpVolume;

  const isSpeakingNow = (crawsState === 'speaking');

  if (!isSpeakingNow && micEnabled && (crawsState === 'listening' || crawsState === 'idle')) {
    // Mouth reacts to mic volume (real-time lip sync like jarvis.html)
    setMouthVolume(volume * 2);

    // Pupil dilation based on volume
    const pupilSize = 8 + volume * 4;
    pupilL.setAttribute('r', pupilSize);
    pupilR.setAttribute('r', pupilSize);

    suppressBlinks = volume > 0.05;

    // Circular visualizer with real data
    const binSize = Math.floor(dataArray.length / NUM_CIRC_BARS);
    for (let i = 0; i < NUM_CIRC_BARS; i++) {
      let sum = 0;
      for (let j = 0; j < binSize; j++) {
        sum += dataArray[i * binSize + j];
      }
      const barVal = (sum / binSize) / 255;
      const targetH = 4 + barVal * 35;
      lerpCircBars[i] = lerp(lerpCircBars[i], targetH, 0.3);
      const h = Math.max(4, lerpCircBars[i]);
      circBars[i].style.height = h + 'px';
      circBars[i].style.opacity = Math.min(1, 0.2 + barVal);
    }
  }

  realtimeAnimFrame = requestAnimationFrame(realtimeAudioLoop);
}

// ==============================================================
// SPEECH RECOGNITION
// ==============================================================
const micIcon = document.getElementById('micIcon');
const micStatus = document.getElementById('micStatus');
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.lang = 'pt-BR';
  recognition.continuous = true;
  recognition.interimResults = true;

  let finalTranscript = '';

  recognition.onresult = (event) => {
    let interim = '';
    finalTranscript = '';

    for (let i = event.resultIndex; i < event.results.length; i++) {
      const transcript = event.results[i][0].transcript;
      if (event.results[i].isFinal) {
        finalTranscript += transcript;
      } else {
        interim += transcript;
      }
    }

    if (interim) {
      liveTranscriptText.textContent = interim;
      liveTranscript.classList.add('visible');
    }
    if (finalTranscript.trim()) {
      liveTranscriptText.textContent = finalTranscript.trim();
      liveTranscript.classList.add('visible');
      setTimeout(() => {
        liveTranscript.classList.remove('visible');
        liveTranscriptText.textContent = '';
      }, 500);
    }

    if (finalTranscript.trim()) {
      try { recognition.stop(); } catch(e) {}
      stopCircularViz();
      stopListeningMicroExpressions();
      crawsState = 'thinking';
      processUserInput(finalTranscript.trim());
    }
  };

  recognition.onstart = () => {
    micIcon.classList.add('active');
    micStatus.textContent = 'ESCUTANDO...';
    crawsState = 'listening';
    setEmotion('listening');
    if (!realtimeActive) {
      animateCircularViz('listening');
    }
  };

  recognition.onend = () => {
    if (micEnabled && !isProcessingCommand) {
      try { recognition.start(); } catch(e) {}
    } else {
      micIcon.classList.remove('active');
      if (!isProcessingCommand) {
        micStatus.textContent = micEnabled ? 'REINICIANDO...' : 'MIC OFF';
        if (crawsState === 'listening') {
          crawsState = 'idle';
          if (!realtimeActive) stopCircularViz();
          stopListeningMicroExpressions();
          setEmotion('neutral');
        }
      }
    }
  };

  recognition.onerror = (event) => {
    if (event.error === 'no-speech' || event.error === 'aborted') return;
    console.error('Speech recognition error:', event.error);
    if (event.error === 'not-allowed') {
      addLine('[SISTEMA] Microfone bloqueado! Use o campo de texto, chefe.', 'system-msg');
      micEnabled = false;
      micIcon.classList.remove('active');
      micStatus.textContent = 'BLOQUEADO';
      stopRealtimeAudio();
    }
  };

  micIcon.addEventListener('click', () => {
    micEnabled = !micEnabled;
    if (micEnabled) {
      startRealtimeAudio();
      try { recognition.start(); } catch(e) {}
    } else {
      try { recognition.stop(); } catch(e) {}
      stopRealtimeAudio();
      stopListeningMicroExpressions();
      micIcon.classList.remove('active');
      micStatus.textContent = 'MIC OFF';
      crawsState = 'idle';
      stopCircularViz();
      setEmotion('neutral');
      setMouthVolume(0);
      robotFaceContainer.style.transform = `rotateY(${parallaxRotY}deg) rotateX(${parallaxRotX}deg)`;
      liveTranscript.classList.remove('visible');
      liveTranscriptText.textContent = '';
    }
  });
} else {
  micStatus.textContent = 'INDISPONIVEL';
  micIcon.style.opacity = '0.3';
  micIcon.style.cursor = 'default';
  addLine('[SISTEMA] Reconhecimento de voz nao disponivel. Use o campo de texto.', 'system-msg');
}

  }
});

// FULLSCREEN

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen().catch(() => {});
  }
}

document.getElementById('robotFaceWrapper').addEventListener('dblclick', (ev) => {
  ev.preventDefault();
  toggleFullscreen();
});

document.addEventListener('keydown', (ev) => {
  if (ev.key === 'F11') {
    ev.preventDefault();
    toggleFullscreen();
  }
});

// Fade fullscreen hint
setTimeout(() => {
  document.getElementById('fullscreenHint').style.opacity = '0';
}, 5000);

// ==============================================================
// BOOT SEQUENCE
// ==============================================================
(function bootSequence() {
  const overlay = document.getElementById('bootOverlay');
  const bt1 = document.getElementById('bootText1');
  const bt2 = document.getElementById('bootText2');
  const titleBlock = document.getElementById('titleBlock');
  const statusPanel = document.getElementById('statusPanel');
  const terminalBlock = document.getElementById('terminalBlock');
  const faceWrapper = document.getElementById('robotFaceWrapper');

  // Hide face initially
  faceWrapper.style.opacity = '0';
  faceWrapper.style.transition = 'opacity 1s ease';

  // Step 1: Boot text appears (0.3s)
  setTimeout(() => { bt1.classList.add('visible'); }, 300);
  setTimeout(() => { bt2.classList.add('visible'); }, 800);

  // Step 2: Circuit lines sweep
  setTimeout(() => { bt2.textContent = 'LOADING CRUSTACEAN PROTOCOLS...'; }, 1500);
  setTimeout(() => { bt2.textContent = 'NEURAL PATHWAYS: CONNECTED'; }, 2200);
  setTimeout(() => { bt2.textContent = 'CLAW SERVOS: CALIBRATED'; }, 2800);

  // Step 3: Eyes power on - show face (3.2s)
  setTimeout(() => {
    faceWrapper.style.opacity = '1';
    pupilL.setAttribute('fill', 'rgba(0,229,204,0.1)');
    pupilR.setAttribute('fill', 'rgba(0,229,204,0.1)');
  }, 3200);

  // Step 4: Eyes glow bright (3.8s)
  setTimeout(() => {
    pupilL.style.transition = 'fill 0.8s ease';
    pupilR.style.transition = 'fill 0.8s ease';
    pupilL.setAttribute('fill', 'rgba(0,229,204,0.9)');
    pupilR.setAttribute('fill', 'rgba(0,229,204,0.9)');
  }, 3800);

  // Step 5: Mouth test - gentle open and close (4.2s)
  setTimeout(() => {
    let testT = 0;
    const testInterval = setInterval(() => {
      testT += 0.2;
      const ry = Math.sin(testT) * 6;
      mouth.setAttribute('ry', Math.max(1, ry));
      if (testT > Math.PI) {
        clearInterval(testInterval);
        mouth.setAttribute('ry', '1');
      }
    }, 50);
  }, 4200);

  // Step 6: Boot text "ONLINE" (5.0s)
  setTimeout(() => {
    bt1.style.color = '#ff4444';
    bt1.textContent = 'OPENCRAWS ONLINE';
    bt2.style.color = '#00e5cc';
    bt2.textContent = 'ALL SYSTEMS NOMINAL';
  }, 5000);

  // Step 7: Hide overlay, show UI (5.8s)
  setTimeout(() => {
    overlay.classList.add('hidden');
    titleBlock.classList.remove('boot-hidden');
    titleBlock.classList.add('boot-visible');
    statusPanel.classList.remove('boot-hidden');
    statusPanel.classList.add('boot-visible');
    terminalBlock.classList.remove('boot-hidden');
    terminalBlock.classList.add('boot-visible');
  }, 5800);

  // Step 8: Remove overlay from DOM (6.8s)
  setTimeout(() => {
    overlay.style.display = 'none';
  }, 6800);

  // Step 9: Terminal boot log with 300ms delays (6.0s+)
  const bootLogMessages = [
    '[BOOT] Initializing neural core... OK',
    '[BOOT] Loading personality matrix... OK',
    '[BOOT] Connecting to Groq... OK'
  ];
  bootLogMessages.forEach((msg, i) => {
    setTimeout(() => {
      addLine(msg, 'system-msg');
    }, 6000 + i * 300);
  });

  // Step 10: Greeting speech after boot log (7.0s)
  setTimeout(() => {
    const greeting = 'E ai, chefe! Opencraws online e pronto pra acao!';
    addLineTyped('[CRAWS] ' + greeting, 'craws-msg', () => {
      speak(greeting);
    });
  }, 6000 + bootLogMessages.length * 300 + 400);
})();

// ==============================================================
// PRESENTATION MODE
// ==============================================================
let presentationMode = false;
let presentationAwaitingTopic = false;
let presentationRunning = false;
let presentationCancelled = false;

const presentationBadge = document.getElementById('presentationBadge');
const presentationCounter = document.getElementById('presentationCounter');
const presentationOverlay = document.getElementById('presentationOverlay');
const presentationSlide = document.getElementById('presentationSlide');

function togglePresentationMode() {
  if (presentationRunning) {
    // Cancel ongoing presentation
    cancelPresentation();
    return;
  }

  if (presentationAwaitingTopic) {
    // Cancel awaiting topic
    presentationAwaitingTopic = false;
    presentationMode = false;
    presentationBadge.classList.remove('active');
    addLine('[SISTEMA] Modo apresentacao cancelado.', 'system-msg');
    termInput.placeholder = 'Digite ou fale, capitao...';
    return;
  }

  // Enter presentation mode - ask for topic
  presentationMode = true;
  presentationAwaitingTopic = true;
  presentationBadge.classList.add('active');
  addLine('[SISTEMA] MODO APRESENTACAO ATIVADO', 'system-msg');
  addLine('[CRAWS] Digite o tema da apresentacao, chefe!', 'craws-msg');
  termInput.placeholder = 'Digite o tema da apresentacao...';
  termInput.focus();
}

function cancelPresentation() {
  presentationCancelled = true;
  presentationRunning = false;
  presentationMode = false;
  presentationAwaitingTopic = false;
  speechSynthesis.cancel();
  stopMouthAnimation();
  stopEyePulse();
  stopHeadBob();
  stopClawGestures();
  stopCircularViz();
  stopAntennaWiggle();
  crawsState = 'idle';
  setEmotion('neutral');
  isProcessingCommand = false;
  presentationOverlay.classList.remove('active');
  presentationCounter.classList.remove('active');
  presentationBadge.classList.remove('active');
  presentationSlide.textContent = '';
  termInput.placeholder = 'Digite ou fale, capitao...';
  addLine('[SISTEMA] Apresentacao cancelada.', 'system-msg');
}

async function getPresentation(topic) {
  const prompt = `Crie uma apresentacao de 5 pontos sobre: ${topic}. Formato: cada ponto em uma linha separada, numerado (1. 2. 3. 4. 5.). Cada ponto deve ter no maximo 2 frases curtas. Seja informativo e engajante.`;

  try {
    const response = await fetch(GROQ_API_URL, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${GROQ_API_KEY}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: GROQ_MODEL,
        messages: [
          { role: 'system', content: 'Voce e o Opencraws, um robo assistente crustaceo futurista que esta dando uma apresentacao. Responda apenas com os 5 pontos numerados, sem introducao ou conclusao.' },
          { role: 'user', content: prompt }
        ],
        max_tokens: 500,
        temperature: 0.7
      })
    });

    if (!response.ok) throw new Error(`API error: ${response.status}`);

    const data = await response.json();
    return data.choices[0].message.content.trim();
  } catch (error) {
    console.error('Presentation API error:', error);
    return null;
  }
}

function parsePoints(text) {
  const lines = text.split('\n').filter(l => l.trim());
  const points = [];
  for (const line of lines) {
    const match = line.match(/^\d+[\.\)]\s*(.+)/);
    if (match) {
      points.push(match[1].trim());
    }
  }
  return points.length > 0 ? points.slice(0, 5) : null;
}

function speakAndWait(text) {
  return new Promise((resolve) => {
    if (presentationCancelled) { resolve(); return; }

    speechSynthesis.cancel();

    crawsState = 'speaking';
    startMouthAnimation();
    startEyePulse();
    startHeadBob();
    startClawGestures();
    animateCircularViz('speaking');

    const utter = new SpeechSynthesisUtterance(text);
    if (selectedVoice) utter.voice = selectedVoice;
    utter.rate = 0.95;
    utter.pitch = 0.9;
    utter.volume = 1;

    utter.onend = () => {
      stopMouthAnimation();
      stopEyePulse();
      stopHeadBob();
      stopClawGestures();
      stopCircularViz();
      resolve();
    };

    utter.onerror = () => {
      stopMouthAnimation();
      stopEyePulse();
      stopHeadBob();
      stopClawGestures();
      stopCircularViz();
      resolve();
    };

    speechSynthesis.speak(utter);
  });
}

function delay(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

async function runPresentation(topic) {
  presentationRunning = true;
  presentationCancelled = false;
  isProcessingCommand = true;

  // Thinking state while generating
  crawsState = 'thinking';
  setEmotion('thinking');
  startClawThinking();
  addLine('[CRAWS] Preparando apresentacao sobre: ' + topic + '...', 'craws-msg');

  const rawText = await getPresentation(topic);
  stopClawThinking();

  if (presentationCancelled) return;

  if (!rawText) {
    addLine('[CRAWS] Eita chefe, nao consegui preparar a apresentacao. Tenta de novo!', 'craws-msg');
    presentationRunning = false;
    presentationMode = false;
    presentationBadge.classList.remove('active');
    isProcessingCommand = false;
    crawsState = 'idle';
    setEmotion('neutral');
    termInput.placeholder = 'Digite ou fale, capitao...';
    return;
  }

  const points = parsePoints(rawText);
  if (!points || points.length === 0) {
    addLine('[CRAWS] Hmm, os dados vieram estranhos, chefe. Tenta outro tema!', 'craws-msg');
    presentationRunning = false;
    presentationMode = false;
    presentationBadge.classList.remove('active');
    isProcessingCommand = false;
    crawsState = 'idle';
    setEmotion('neutral');
    termInput.placeholder = 'Digite ou fale, capitao...';
    return;
  }

  // Intro
  const introText = `Beleza chefe, vou apresentar sobre ${topic}! Bora la!`;
  addLine('[CRAWS] ' + introText, 'craws-msg');
  setEmotion('happy');
  await speakAndWait(introText);
  if (presentationCancelled) return;
  await delay(1000);

  // Show overlay
  presentationOverlay.classList.add('active');
  presentationCounter.classList.add('active');

  const emotions = ['curious', 'happy', 'thinking', 'speaking', 'happy'];
  // Map 'curious' to 'listening' since there's no 'curious' emotion
  const emotionMap = { 'curious': 'listening', 'happy': 'happy', 'thinking': 'thinking', 'speaking': 'speaking' };

  for (let i = 0; i < points.length; i++) {
    if (presentationCancelled) return;

    const point = points[i];
    const slideNum = i + 1;

    // Update counter
    presentationCounter.textContent = `SLIDE ${slideNum}/${points.length}`;

    // Update slide text
    presentationSlide.textContent = point;

    // Set emotion for this point
    const emo = emotions[i] || 'speaking';
    setEmotion(emotionMap[emo] || emo);

    // Show in terminal
    addLine(`[SLIDE ${slideNum}/${points.length}] ${point}`, 'craws-msg');

    // Speak the point
    await speakAndWait(point);
    if (presentationCancelled) return;

    // Pause between points
    crawsState = 'idle';
    await delay(2000);
    if (presentationCancelled) return;
  }

  // Conclusion
  presentationSlide.textContent = '';
  presentationOverlay.classList.remove('active');
  presentationCounter.classList.remove('active');

  const outroText = 'E e isso, chefe! Espero que tenha sido util!';
  addLine('[CRAWS] ' + outroText, 'craws-msg');
  setEmotion('happy');
  await speakAndWait(outroText);

  // Reset everything
  presentationRunning = false;
  presentationMode = false;
  presentationBadge.classList.remove('active');
  isProcessingCommand = false;
  crawsState = 'idle';
  setEmotion('neutral');
  termInput.placeholder = 'Digite ou fale, capitao...';
}
